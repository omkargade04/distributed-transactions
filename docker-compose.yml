services:
  postgres:
    image: postgres:16-alpine
    container_name: payment-postgres
    # v3: enable pg_stat_statements for query profiling.
    # shared_preload_libraries must be set at server start — easiest via command flag.
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
      -c pg_stat_statements.max=1000
    environment:
      POSTGRES_USER: payment
      POSTGRES_PASSWORD: payment_dev
      POSTGRES_DB: payment
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # v2: migrations now run from the Go binary via golang-migrate.
      # Previous mount removed:  - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment -d payment"]
      interval: 2s
      timeout: 2s
      retries: 10
    restart: unless-stopped

  payment-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payment-api
    environment:
      DB_URL: "postgres://payment:payment_dev@postgres:5432/payment?sslmode=disable"
      PORT: "8080"
      LOG_LEVEL: "info"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"   # DELIBERATE: crashes must stay crashed (kill experiments)
    stop_grace_period: 35s   # v2: > srv.Shutdown(30s) timeout, lets graceful drain finish

volumes:
  pgdata:
